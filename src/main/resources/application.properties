# ========================================
# 中正國中公告爬蟲設定檔（範本）
# 使用方式：
#   1. 複製此檔案為 application.properties
#   2. 填入真實的資料
#   3. application.properties 不會被提交到 Git
# ========================================

# ========================================
# 應用程式基本設定
# ========================================
app.name=中正國中公告爬蟲
app.version=2.2

# ========================================
# 路徑設定
# ========================================
# Windows 範例：D:\\Projects\\CrawlZhongzheng\\
# Linux 範例：/home/user/crawler/
app.main.path=D:\\

# ========================================
# 爬蟲設定
# ========================================
# 目標網站網址
crawler.url=https://www.ccjhs.tp.edu.tw/category/news/

# 重試設定
crawler.max.retries=5
crawler.base.timeout=30000
crawler.min.retry.delay=2000
crawler.max.retry.delay=10000

# ========================================
# 關鍵字設定（嚴格匹配）
# 用逗號分隔，命中任一個就符合
# ========================================
keywords.strict=場地開放,球場,羽球,羽,籃球,籃,空球場,租借,預約,登記,申請,意願

# ========================================
# 關鍵字設定（擴展匹配）
# 需要命中至少 2 個才符合
# ========================================
keywords.extended=開放,校園場地,中正國中,未繳費,季,表單

# ========================================
# 郵件設定
# ========================================
# SMTP 伺服器（Gmail 範例）
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587

# 寄件人帳號和密碼
# 注意：Gmail 需要使用「應用程式密碼」，不是登入密碼
mail.username=your-email@gmail.com
mail.password=YOUR_APP_PASSWORD_HERE

# 郵件主旨
mail.subject=(非社交工程)中正國中 每日公告通知

# 收件人列表檔案路徑
# 相對於 app.main.path
mail.recipients.file=MailTo.txt

# ========================================
# LINE 通知設定
# ========================================
# LINE Notify Token（如果有使用 LINE 通知）
line.notify.token=YOUR_LINE_TOKEN_HERE

# ========================================
# 日誌設定
# ========================================
# 專案名稱（用於日誌檔名）
log.project.name=crawler

# ========================================
# 其他設定
# ========================================
# URL 快取檔案命名格式
# %s 會被替換成日期（YYYY-MM-DD）
cache.url.filename.pattern=url_%s.txt