name: 居家伺服器容器化自動部署

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy-container:
    runs-on: self-hosted
    
    steps:
    - name: 📥 步驟一：拉取最新原始碼
      uses: actions/checkout@v4
      
    - name: 🛠️ 步驟二：使用 Podman 打包容器鏡像
      run: |
        # 建立名為 crawl-zhongzheng 的本地容器鏡像
        podman build -t crawl-zhongzheng:latest .
        
    - name: 🔄 步驟三：汰換舊容器並重啟新服務
      run: |
        # 1. 停止舊的容器 (如果存在的話，加上 || true 防止第一次執行噴錯)
        podman stop crawl-zhongzheng-service || true
        
        # 2. 刪除舊的容器
        podman rm crawl-zhongzheng-service || true
        
        # 3. 用最新的鏡像啟動新容器，並讓它在背景長期執行 (--restart always 確保開機自啟)
        podman run -d \
          --name crawl-zhongzheng-service \
          --restart always \
          crawl-zhongzheng:latest
          
    - name: 📊 步驟四：檢查運行狀態
      run: |
        podman ps -a | grep crawl-zhongzheng-service